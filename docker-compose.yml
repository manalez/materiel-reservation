version: '3.8'

services:

  # Serveur PHP qui fait tourner Symfony
  php:
    image: php:8.2-fpm
    working_dir: /var/www/back
    volumes:
      - ./back:/var/www/back
    depends_on:
      - db

  # Serveur web qui reçoit les requêtes
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./back:/var/www/back
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # Base de données MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reservation_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: